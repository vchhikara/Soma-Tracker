<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOMA — 3D Fitness Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-void: #080C10;
    --bg-surface: #0D1117;
    --bg-raised: #131920;
    --bg-elevated: #1A2330;
    --bg-hover: #1F2B3A;
    --border-dim: rgba(255,255,255,0.06);
    --border-mid: rgba(255,255,255,0.12);
    --border-bright: rgba(255,255,255,0.22);
    --text-primary: #F0F4F8;
    --text-secondary: #8A9BB0;
    --text-tertiary: #4A5A6A;
    --accent-cyan: #00D4FF;
    --accent-cyan-dim: rgba(0,212,255,0.08);
    --accent-cyan-mid: rgba(0,212,255,0.15);
    --accent-lime: #A8FF3E;
    --accent-lime-dim: rgba(168,255,62,0.08);
    --accent-rose: #FF4D6A;
    --accent-rose-dim: rgba(255,77,106,0.08);
    --accent-amber: #FFB443;
    --accent-amber-dim: rgba(255,180,67,0.08);
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-xl: 24px;
  }

  html, body, #root {
    height: 100%;
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden;
  }

  #root { display: flex; flex-direction: column; }

  /* SCROLLBARS */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

  /* NAV */
  .nav {
    display: flex; align-items: center; gap: 0;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border-dim);
    background: var(--bg-surface);
    flex-shrink: 0;
    position: relative;
    z-index: 100;
  }
  .nav-logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.12em;
    color: var(--accent-cyan);
    margin-right: 40px;
  }
  .nav-logo span { color: var(--text-tertiary); font-weight: 400; }
  .nav-tabs { display: flex; gap: 2px; }
  .nav-tab {
    padding: 6px 16px;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    background: transparent;
    letter-spacing: 0.02em;
  }
  .nav-tab:hover { color: var(--text-primary); background: var(--bg-raised); }
  .nav-tab.active {
    color: var(--accent-cyan);
    background: var(--accent-cyan-dim);
    border: 1px solid rgba(0,212,255,0.2);
  }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .entry-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
    padding: 4px 10px;
    background: var(--bg-raised);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-dim);
  }

  /* MAIN LAYOUT */
  .app-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* ── BODY VIEW (3D + Form) */
  .body-view {
    flex: 1; display: flex; overflow: hidden;
  }

  /* 3D PANE */
  .canvas-pane {
    flex: 1; position: relative; overflow: hidden;
    background: radial-gradient(ellipse at 50% 30%, #0A1825 0%, var(--bg-void) 70%);
  }
  .canvas-pane canvas { width: 100% !important; height: 100% !important; }

  .canvas-grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--border-dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--border-dim) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
  }

  .canvas-label-overlay {
    position: absolute; inset: 0; pointer-events: none;
  }

  /* TOOLTIP */
  .tooltip-3d {
    position: absolute;
    background: var(--bg-elevated);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    pointer-events: none;
    z-index: 50;
    min-width: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    transform: translate(-50%, -110%);
  }
  .tooltip-3d::after {
    content: '';
    position: absolute;
    left: 50%; bottom: -5px;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    background: var(--bg-elevated);
    border-right: 1px solid var(--border-bright);
    border-bottom: 1px solid var(--border-bright);
    transform: translateX(-50%) rotate(45deg);
  }
  .tooltip-part { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--accent-cyan); margin-bottom: 4px; }
  .tooltip-value { font-family: var(--font-mono); font-size: 18px; font-weight: 500; color: var(--text-primary); }
  .tooltip-unit { font-size: 11px; color: var(--text-secondary); margin-left: 3px; }
  .tooltip-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }

  /* BODY MODEL FALLBACK (2D SVG) */
  .body-svg-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  /* SIDE PANE */
  .side-pane {
    width: 360px;
    flex-shrink: 0;
    border-left: 1px solid var(--border-dim);
    background: var(--bg-surface);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .side-section {
    padding: 20px;
    border-bottom: 1px solid var(--border-dim);
  }
  .side-section-title {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 14px;
  }

  /* FORM ELEMENTS */
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .form-label {
    font-size: 11px;
    color: var(--text-tertiary);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }
  .form-input {
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    width: 100%;
    transition: border-color 0.15s;
    outline: none;
  }
  .form-input:hover { border-color: var(--border-mid); }
  .form-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px var(--accent-cyan-dim); }
  .form-input::placeholder { color: var(--text-tertiary); }

  .bilateral-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .bilateral-label {
    grid-column: 1 / -1;
    font-size: 10px;
    color: var(--text-tertiary);
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding-top: 6px;
    border-top: 1px solid var(--border-dim);
    margin-top: 4px;
  }
  .side-tag {
    font-size: 9px;
    font-family: var(--font-mono);
    padding: 2px 5px;
    border-radius: 3px;
    margin-left: 4px;
  }
  .side-tag.L { background: rgba(0,212,255,0.15); color: var(--accent-cyan); }
  .side-tag.R { background: rgba(168,255,62,0.12); color: var(--accent-lime); }

  .btn {
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    padding: 8px 16px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--accent-cyan);
    color: var(--bg-void);
    width: 100%;
    justify-content: center;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .btn-primary:hover { background: #33DCFF; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost {
    background: var(--bg-raised);
    color: var(--text-secondary);
    border: 1px solid var(--border-dim);
    width: 100%;
    justify-content: center;
    margin-bottom: 8px;
  }
  .btn-ghost:hover { border-color: var(--border-mid); color: var(--text-primary); background: var(--bg-elevated); }
  .btn-danger {
    background: var(--accent-rose-dim);
    color: var(--accent-rose);
    border: 1px solid rgba(255,77,106,0.2);
    font-size: 11px;
    padding: 4px 10px;
  }
  .btn-danger:hover { background: rgba(255,77,106,0.15); }

  /* QUICK STATS */
  .quick-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-md);
    padding: 12px 10px;
    text-align: center;
  }
  .stat-card-label { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); margin-bottom: 4px; }
  .stat-card-value { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text-primary); }
  .stat-card-unit { font-size: 10px; color: var(--text-tertiary); font-weight: 400; }
  .stat-card-delta { font-family: var(--font-mono); font-size: 10px; margin-top: 2px; }
  .delta-pos { color: var(--accent-lime); }
  .delta-neg { color: var(--accent-rose); }
  .delta-neu { color: var(--text-tertiary); }

  /* ANALYTICS */
  .analytics-view {
    flex: 1; overflow: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .analytics-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .analytics-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .analytics-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .chart-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-lg);
    padding: 20px;
    overflow: hidden;
  }
  .chart-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .chart-card-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .chart-toggle-group { display: flex; gap: 4px; }
  .chart-toggle {
    padding: 3px 10px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-family: var(--font-mono);
    cursor: pointer;
    border: 1px solid var(--border-dim);
    background: transparent;
    color: var(--text-tertiary);
    transition: all 0.15s;
  }
  .chart-toggle:hover { color: var(--text-secondary); border-color: var(--border-mid); }
  .chart-toggle.active { background: var(--accent-cyan-dim); border-color: rgba(0,212,255,0.3); color: var(--accent-cyan); }

  /* DATA TABLE */
  .table-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .table-card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th {
    padding: 8px 14px;
    text-align: left;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    border-bottom: 1px solid var(--border-dim);
    background: var(--bg-void);
    position: sticky; top: 0;
  }
  .data-table td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border-dim);
    font-family: var(--font-mono);
    color: var(--text-secondary);
    vertical-align: middle;
  }
  .data-table tr:hover td { background: var(--bg-raised); color: var(--text-primary); }
  .data-table tr:last-child td { border-bottom: none; }
  .td-date { color: var(--text-primary) !important; font-weight: 500; }
  .td-highlight { color: var(--accent-cyan) !important; }

  /* BODY PART DOTS */
  .body-hit-area {
    position: absolute;
    cursor: pointer;
    border-radius: 50%;
    transition: all 0.2s;
  }
  .body-hit-area:hover .body-dot { transform: scale(1.5); }
  .body-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent-cyan);
    border: 2px solid var(--bg-void);
    box-shadow: 0 0 8px var(--accent-cyan);
    transition: transform 0.2s;
  }
  .body-dot.has-data { background: var(--accent-lime); box-shadow: 0 0 8px var(--accent-lime); }
  .body-dot.bilateral-L { background: var(--accent-cyan); }
  .body-dot.bilateral-R { background: var(--accent-lime); }

  /* EMPTY STATE */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 40px 20px; text-align: center;
  }
  .empty-icon { font-size: 32px; opacity: 0.3; }
  .empty-title { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-secondary); }
  .empty-sub { font-size: 12px; color: var(--text-tertiary); max-width: 200px; }

  /* NOTIFICATION */
  .notification {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-bright);
    border-left: 3px solid var(--accent-cyan);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text-primary);
    z-index: 1000;
    animation: slideUp 0.3s ease;
    max-width: 280px;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* MEASUREMENT SECTION DIVIDERS */
  .form-section-divider {
    display: flex; align-items: center; gap: 8px;
    margin: 12px 0 8px;
  }
  .form-section-divider span {
    font-size: 10px;
    font-family: var(--font-mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-cyan);
    white-space: nowrap;
  }
  .form-section-divider::before, .form-section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-dim);
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .analytics-grid { grid-template-columns: 1fr; }
    .side-pane { width: 300px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const {
  LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip: ReTooltip,
  ResponsiveContainer, Legend, AreaChart, Area
} = Recharts;

/* ══════════════════════════════════════════════════════════
   1. DATA SCHEMA & STORAGE SERVICE
══════════════════════════════════════════════════════════ */

const DB_KEY = 'soma_fitness_entries_v1';

const createEmptyEntry = (date = new Date().toISOString().split('T')[0]) => ({
  id: `entry_${Date.now()}`,
  date,
  overall: {
    heightFt: '', heightIn: '', weight: '', bodyFatPct: ''
  },
  measurements: {
    neck: '', shoulders: '', chest: '', belly: '', waist: '', glutes: ''
  },
  bilateral: {
    bicepsL: '', bicepsR: '',
    forearmsL: '', forearmsR: '',
    wristsL: '', wristsR: '',
    thighsMaxL: '', thighsMaxR: '',
    thighsMinL: '', thighsMinR: '',
    calvesL: '', calvesR: '',
    anklesL: '', anklesR: '',
  }
});

const StorageService = {
  getAll() {
    try {
      const raw = localStorage.getItem(DB_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  },
  save(entries) {
    try { localStorage.setItem(DB_KEY, JSON.stringify(entries)); return true; }
    catch { return false; }
  },
  addEntry(entry) {
    const entries = this.getAll();
    const idx = entries.findIndex(e => e.id === entry.id);
    if (idx >= 0) entries[idx] = entry;
    else entries.unshift(entry);
    entries.sort((a, b) => new Date(b.date) - new Date(a.date));
    return this.save(entries);
  },
  deleteEntry(id) {
    const entries = this.getAll().filter(e => e.id !== id);
    return this.save(entries);
  }
};

/* Seed sample data if empty */
function seedSampleData() {
  if (StorageService.getAll().length > 0) return;
  const base = [
    { w: 88.5, bf: 22.1, neck: 15.8, shoulders: 46.5, chest: 40.2, belly: 36.8, waist: 34.5, glutes: 39.2,
      bicepsL: 14.5, bicepsR: 14.6, forearmsL: 11.8, forearmsR: 11.9, wristsL: 6.8, wristsR: 6.8,
      thighsMaxL: 23.5, thighsMaxR: 23.6, thighsMinL: 15.2, thighsMinR: 15.3, calvesL: 14.8, calvesR: 14.9, anklesL: 8.5, anklesR: 8.5 },
    { w: 87.2, bf: 21.4, neck: 15.9, shoulders: 46.8, chest: 40.5, belly: 36.1, waist: 33.8, glutes: 39.0,
      bicepsL: 14.8, bicepsR: 14.9, forearmsL: 12.0, forearmsR: 12.1, wristsL: 6.8, wristsR: 6.8,
      thighsMaxL: 23.2, thighsMaxR: 23.3, thighsMinL: 15.0, thighsMinR: 15.1, calvesL: 14.9, calvesR: 15.0, anklesL: 8.4, anklesR: 8.4 },
    { w: 85.8, bf: 20.5, neck: 16.0, shoulders: 47.2, chest: 40.9, belly: 35.3, waist: 33.0, glutes: 38.7,
      bicepsL: 15.1, bicepsR: 15.2, forearmsL: 12.2, forearmsR: 12.3, wristsL: 6.9, wristsR: 6.9,
      thighsMaxL: 22.9, thighsMaxR: 23.0, thighsMinL: 14.8, thighsMinR: 14.9, calvesL: 15.1, calvesR: 15.2, anklesL: 8.4, anklesR: 8.3 },
    { w: 84.1, bf: 19.7, neck: 16.1, shoulders: 47.6, chest: 41.3, belly: 34.5, waist: 32.2, glutes: 38.4,
      bicepsL: 15.4, bicepsR: 15.5, forearmsL: 12.4, forearmsR: 12.5, wristsL: 6.9, wristsR: 6.9,
      thighsMaxL: 22.6, thighsMaxR: 22.7, thighsMinL: 14.6, thighsMinR: 14.7, calvesL: 15.2, calvesR: 15.3, anklesL: 8.3, anklesR: 8.3 },
    { w: 83.0, bf: 19.0, neck: 16.2, shoulders: 47.9, chest: 41.8, belly: 33.8, waist: 31.5, glutes: 38.1,
      bicepsL: 15.7, bicepsR: 15.8, forearmsL: 12.6, forearmsR: 12.7, wristsL: 7.0, wristsR: 7.0,
      thighsMaxL: 22.3, thighsMaxR: 22.4, thighsMinL: 14.4, thighsMinR: 14.5, calvesL: 15.3, calvesR: 15.4, anklesL: 8.2, anklesR: 8.2 },
  ];
  const now = new Date();
  base.forEach((d, i) => {
    const date = new Date(now);
    date.setDate(date.getDate() - (base.length - 1 - i) * 21);
    StorageService.addEntry({
      id: `seed_${i}`,
      date: date.toISOString().split('T')[0],
      overall: { heightFt: '5', heightIn: '11', weight: String(d.w), bodyFatPct: String(d.bf) },
      measurements: { neck: String(d.neck), shoulders: String(d.shoulders), chest: String(d.chest), belly: String(d.belly), waist: String(d.waist), glutes: String(d.glutes) },
      bilateral: {
        bicepsL: String(d.bicepsL), bicepsR: String(d.bicepsR),
        forearmsL: String(d.forearmsL), forearmsR: String(d.forearmsR),
        wristsL: String(d.wristsL), wristsR: String(d.wristsR),
        thighsMaxL: String(d.thighsMaxL), thighsMaxR: String(d.thighsMaxR),
        thighsMinL: String(d.thighsMinL), thighsMinR: String(d.thighsMinR),
        calvesL: String(d.calvesL), calvesR: String(d.calvesR),
        anklesL: String(d.anklesL), anklesR: String(d.anklesR),
      }
    });
  });
}

/* ══════════════════════════════════════════════════════════
   2. BODY PARTS MAP — Links to data fields
   This is your mesh name → data field mapping.
   In a real .glb file, name each mesh exactly as the keys below.
══════════════════════════════════════════════════════════ */

const BODY_PARTS = [
  // HEAD / NECK
  { id: 'neck',        label: 'Neck',           field: 'measurements.neck',       unit: 'in', category: 'measurements', svgX: 50,  svgY: 11  },

function getFieldValue(entry, fieldPath) {
  if (!entry) return null;
  const parts = fieldPath.split('.');
  let val = entry;
  for (const p of parts) { val = val?.[p]; }
  return val || null;
}

          <path d="M33,56 Q34,70 35,78 Q38,79 41,78 Q41,70 40,56 Z" fill="#0A1820" stroke="#1A3A55" strokeWidth="0.35"/>
          {/* Right thigh */}

          return (
            <g
              key={part.id}

function DataEntryForm({ entries, onSave, notification }) {
  const [form, setForm] = useState(() => createEmptyEntry());
  const [isSaving, setIsSaving] = useState(false);

  const setNested = (path, val) => {
    const [section, key] = path.split('.');
    setForm(f => ({ ...f, [section]: { ...f[section], [key]: val } }));
  };

  const quickFill = () => {
    if (!entries.length) return;
    const prev = entries[0];
    setForm(f => ({
      ...f,
      overall: { ...prev.overall },
      measurements: { ...prev.measurements },
      bilateral: { ...prev.bilateral },
    }));
  };

  const handleSave = () => {
    setIsSaving(true);
    setTimeout(() => {
      onSave({ ...form, id: `entry_${Date.now()}` });
      setForm(createEmptyEntry());
      setIsSaving(false);
    }, 200);
  };

  const F = ({ label, path, placeholder = '0.0' }) => (
    <div className="form-group">
      <label className="form-label">{label}</label>
      <input
        className="form-input"
        type="number"
        step="0.1"
        placeholder={placeholder}
        value={getFieldValue(form, path) || ''}
        onChange={e => setNested(path, e.target.value)}
      />
    </div>
  );

  return (
    <div className="side-pane">
      <div className="side-section">
        <div className="side-section-title">New Entry</div>
        <div className="form-row">
          <div className="form-group" style={{flex:1}}>
            <label className="form-label">Date</label>
            <input
              className="form-input"
              type="date"
              value={form.date}
              onChange={e => setForm(f => ({ ...f, date: e.target.value }))}
            />
          </div>
        </div>
        {entries.length > 0 && (
          <button className="btn btn-ghost" onClick={quickFill}>
            ⚡ Quick-fill from last entry
          </button>
        )}
        <button
          className="btn btn-primary"
          onClick={handleSave}
          disabled={isSaving}
        >
          {isSaving ? '...' : '＋ Save Entry'}
        </button>
      </div>

      <div className="side-section">
        <div className="side-section-title">Overall</div>
        <div className="form-row">
          <F label="Height (ft)" path="overall.heightFt" placeholder="5" />
          <F label="Height (in)" path="overall.heightIn" placeholder="11" />
        </div>
        <div className="form-row">
          <F label="Weight (kg)" path="overall.weight" placeholder="80.0" />
          <F label="Body Fat %" path="overall.bodyFatPct" placeholder="18.0" />
        </div>
      </div>

      <div className="side-section">
        <div className="side-section-title">Circumference — inches</div>
        <div className="form-section-divider"><span>Neck & Upper Body</span></div>
        <div className="form-row">
          <F label="Neck" path="measurements.neck" />
          <F label="Shoulders" path="measurements.shoulders" />
        </div>
        <div className="form-row">
          <F label="Chest" path="measurements.chest" />
          <F label="Belly" path="measurements.belly" />
        </div>
        <div className="form-row">
          <F label="Waist" path="measurements.waist" />
          <F label="Glutes" path="measurements.glutes" />
        </div>
      </div>

      <div className="side-section">
        <div className="side-section-title">Bilateral — inches</div>

        {[
          ['Biceps', 'bilateral.bicepsL', 'bilateral.bicepsR'],
          ['Forearms', 'bilateral.forearmsL', 'bilateral.forearmsR'],
          ['Wrists', 'bilateral.wristsL', 'bilateral.wristsR'],
          ['Thigh max', 'bilateral.thighsMaxL', 'bilateral.thighsMaxR'],
          ['Thigh min', 'bilateral.thighsMinL', 'bilateral.thighsMinR'],
          ['Calves', 'bilateral.calvesL', 'bilateral.calvesR'],
          ['Ankles', 'bilateral.anklesL', 'bilateral.anklesR'],
        ].map(([name, L, R]) => (
          <div key={name} style={{ marginBottom: 6 }}>
            <div style={{ fontSize: 10, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)', letterSpacing: '0.06em', marginBottom: 4 }}>
              {name.toUpperCase()}
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Left <span className="side-tag L">L</span></label>
                <input
                  className="form-input"
                  type="number" step="0.1" placeholder="0.0"
                  value={getFieldValue(form, L) || ''}
                  onChange={e => setNested(L, e.target.value)}
                />
              </div>
              <div className="form-group">
                <label className="form-label">Right <span className="side-tag R">R</span></label>
                <input
                  className="form-input"
                  type="number" step="0.1" placeholder="0.0"
                  value={getFieldValue(form, R) || ''}
                  onChange={e => setNested(R, e.target.value)}
                />
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

function AnalyticsDashboard({ entries }) {
  const [bodyMetricKeys, setBodyMetricKeys] = useState(['weight', 'bodyFat']);
  const [circKeys, setCircKeys] = useState(['waist', 'chest']);
  const [limbKeys, setLimbKeys] = useState(['bicepsL', 'bicepsR']);

  const chartData = useMemo(() => {
    return [...entries].reverse().map(e => ({
      date: e.date.slice(5),
      fullDate: e.date,
      weight: parseFloat(e.overall.weight) || null,
      bodyFat: parseFloat(e.overall.bodyFatPct) || null,
      neck: parseFloat(e.measurements.neck) || null,
      shoulders: parseFloat(e.measurements.shoulders) || null,
      chest: parseFloat(e.measurements.chest) || null,
      belly: parseFloat(e.measurements.belly) || null,
      waist: parseFloat(e.measurements.waist) || null,
      glutes: parseFloat(e.measurements.glutes) || null,
      bicepsL: parseFloat(e.bilateral.bicepsL) || null,
      bicepsR: parseFloat(e.bilateral.bicepsR) || null,
      forearmsL: parseFloat(e.bilateral.forearmsL) || null,
      forearmsR: parseFloat(e.bilateral.forearmsR) || null,
      thighsMaxL: parseFloat(e.bilateral.thighsMaxL) || null,
      thighsMaxR: parseFloat(e.bilateral.thighsMaxR) || null,
      calvesL: parseFloat(e.bilateral.calvesL) || null,
      calvesR: parseFloat(e.bilateral.calvesR) || null,
    }));
  }, [entries]);

  const latest = entries[0];
  const prev = entries[1];

  const delta = (curr, prevVal) => {
    const c = parseFloat(curr);
    const p = parseFloat(prevVal);
    if (isNaN(c) || isNaN(p)) return null;
    return (c - p).toFixed(1);
  };

  const StatCard = ({ label, value, unit, prevValue, invertDelta = false }) => {
    const d = delta(value, prevValue);
    const isPos = d > 0;
    const isGood = invertDelta ? !isPos : isPos;
    return (
      <div className="stat-card">
        <div className="stat-card-label">{label}</div>
        <div className="stat-card-value">
          {value || '–'}<span className="stat-card-unit"> {unit}</span>
        </div>
        {d !== null && (
          <div className={`stat-card-delta ${d == 0 ? 'delta-neu' : isGood ? 'delta-pos' : 'delta-neg'}`}>
            {d > 0 ? '▲' : d < 0 ? '▼' : '●'} {Math.abs(d)}

              {circKeys.map(k => <Line key={k} type="monotone" dataKey={k} name={k} stroke={lineColors[k] || '#aaa'} strokeWidth={2} dot={{ r: 2.5, fill: lineColors[k] }} activeDot={{ r: 4 }} connectNulls />)}
            </LineChart>
          </ResponsiveContainer>
        </div>

        {/* Limbs bilateral */}
        <div className="chart-card">
          <div className="chart-card-header">
            <div className="chart-card-title">Limb Measurements (in)</div>
            <div className="chart-toggle-group" style={{ flexWrap: 'wrap', gap: 3 }}>
              {['bicepsL','bicepsR','forearmsL','forearmsR','thighsMaxL','thighsMaxR','calvesL','calvesR'].map(k => <ToggleBtn key={k} val={k} active={limbKeys} setActive={setLimbKeys} color={lineColors[k]} />)}
            </div>
          </div>
          <ResponsiveContainer width="100%" height={200}>
            <LineChart data={chartData} margin={{ top: 4, right: 4, bottom: 0, left: -20 }}>
              <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.04)" vertical={false} />
              <XAxis dataKey="date" tick={{ fontSize: 10, fill: '#4A5A6A', fontFamily: 'DM Mono' }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontSize: 10, fill: '#4A5A6A', fontFamily: 'DM Mono' }} axisLine={false} tickLine={false} />
              <ReTooltip content={<CustomChartTooltip />} />
              {limbKeys.map(k => <Line key={k} type="monotone" dataKey={k} name={k} stroke={lineColors[k] || '#aaa'} strokeWidth={2} dot={{ r: 2.5, fill: lineColors[k] }} activeDot={{ r: 4 }} connectNulls />)}
            </LineChart>
          </ResponsiveContainer>
        </div>

        {/* Body fat area chart */}
        <div className="chart-card">
          <div className="chart-card-header">
            <div className="chart-card-title">Body Composition Trend</div>
          </div>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={chartData} margin={{ top: 4, right: 4, bottom: 0, left: -20 }}>
              <defs>
                <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor="#00D4FF" stopOpacity={0.25}/>
                  <stop offset="95%" stopColor="#00D4FF" stopOpacity={0}/>
                </linearGradient>
                <linearGradient id="bfGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor="#FF4D6A" stopOpacity={0.25}/>
                  <stop offset="95%" stopColor="#FF4D6A" stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.04)" vertical={false} />
              <XAxis dataKey="date" tick={{ fontSize: 10, fill: '#4A5A6A', fontFamily: 'DM Mono' }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontSize: 10, fill: '#4A5A6A', fontFamily: 'DM Mono' }} axisLine={false} tickLine={false} />
              <ReTooltip content={<CustomChartTooltip />} />
              <Area type="monotone" dataKey="weight" name="Weight kg" stroke="#00D4FF" fill="url(#wGrad)" strokeWidth={2} dot={false} connectNulls />
              <Area type="monotone" dataKey="bodyFat" name="Body Fat %" stroke="#FF4D6A" fill="url(#bfGrad)" strokeWidth={2} dot={false} connectNulls />
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* DATA TABLE */}
      <div className="table-card">
        <div className="table-card-header">
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 13 }}>All Entries</div>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-tertiary)' }}>{entries.length} records</div>
        </div>
        <div style={{ overflowX: 'auto', maxHeight: 320, overflowY: 'auto' }}>
          <table className="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Weight</th>
                <th>BF%</th>
                <th>Neck</th>
                <th>Chest</th>
                <th>Waist</th>
                <th>Belly</th>
                <th>Glutes</th>
                <th>Bicep L</th>
                <th>Bicep R</th>
                <th>Thigh L</th>
                <th>Thigh R</th>
                <th>Calf L</th>
                <th>Calf R</th>
              </tr>
            </thead>
            <tbody>
              {entries.map((e, i) => (
                <tr key={e.id}>
                  <td className="td-date">{e.date}</td>
                  <td className={i === 0 ? 'td-highlight' : ''}>{e.overall.weight || '–'} kg</td>
                  <td>{e.overall.bodyFatPct || '–'} %</td>
                  <td>{e.measurements.neck || '–'}</td>
                  <td>{e.measurements.chest || '–'}</td>
                  <td>{e.measurements.waist || '–'}</td>
                  <td>{e.measurements.belly || '–'}</td>
                  <td>{e.measurements.glutes || '–'}</td>
                  <td>{e.bilateral.bicepsL || '–'}</td>
                  <td>{e.bilateral.bicepsR || '–'}</td>
                  <td>{e.bilateral.thighsMaxL || '–'}</td>
                  <td>{e.bilateral.thighsMaxR || '–'}</td>
                  <td>{e.bilateral.calvesL || '–'}</td>
                  <td>{e.bilateral.calvesR || '–'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   6. 3D CANVAS PANE (with 2D fallback + GLB instructions)
══════════════════════════════════════════════════════════ */

function BodyCanvas({ entries, onPartHover }) {
  const [hoveredPart, setHoveredPart] = useState(null);
  const [hoveredValue, setHoveredValue] = useState(null);
  const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
  const [activePart, setActivePart] = useState(null);
  const paneRef = useRef(null);

  const handleMouseMove = useCallback(e => {
    setMousePos({ x: e.clientX, y: e.clientY });
  }, []);

  const handlePartHover = useCallback((part, val) => {
    setHoveredPart(part);
    setHoveredValue(val);
    if (part) setActivePart(part.id);
    else setActivePart(null);
  }, []);

  const handlePartClick = useCallback((part) => {
    onPartHover(part);
  }, [onPartHover]);

  const latest = entries[0];
  const latestDate = latest?.date;

  return (
    <div
      ref={paneRef}
      className="canvas-pane"
      onMouseMove={handleMouseMove}
    >
      <div className="canvas-grid" />

      {/* ANNOTATION: Replace this with <Canvas> from @react-three/fiber */}
      <AnatomicalBody
        entries={entries}
        onPartHover={handlePartHover}
        onPartClick={handlePartClick}
        activePartId={activePart}
      />

      {/* FLOATING TOOLTIP */}
      {hoveredPart && (
        <div
          className="tooltip-3d"
          style={{
            left: mousePos.x - (paneRef.current?.getBoundingClientRect().left || 0),
            top: mousePos.y - (paneRef.current?.getBoundingClientRect().top || 0),
          }}
        >
          <div className="tooltip-part">{hoveredPart.label}</div>
          <div className="tooltip-value">
            {hoveredValue || '–'}
            <span className="tooltip-unit">{hoveredPart.unit}</span>
          </div>
          <div className="tooltip-date">{latestDate || 'No data'}</div>
        </div>
      )}

      {/* LEGEND */}
      <div style={{
        position: 'absolute', bottom: 16, left: 16,
        display: 'flex', flexDirection: 'column', gap: 6
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 11, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>
          <span style={{ width: 8, height: 8, borderRadius: '50%', background: '#00D4FF', boxShadow: '0 0 6px #00D4FF', display: 'inline-block' }}/>
          Left / single measurement
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 11, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>
          <span style={{ width: 8, height: 8, borderRadius: '50%', background: '#A8FF3E', boxShadow: '0 0 6px #A8FF3E', display: 'inline-block' }}/>
          Right measurement
        </div>
      </div>

      {/* Corner badge */}
      <div style={{
        position: 'absolute', top: 14, left: 14,
        fontFamily: 'var(--font-mono)', fontSize: 9, letterSpacing: '0.1em',
        color: 'var(--text-tertiary)', textTransform: 'uppercase',
        padding: '4px 8px', background: 'rgba(0,0,0,0.4)',
        borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-dim)'
      }}>
        {entries.length > 0 ? `Last: ${latestDate}` : 'No entries'}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   7. ROOT APP
══════════════════════════════════════════════════════════ */

function App() {
  const [entries, setEntries] = useState([]);
  const [view, setView] = useState('body'); // 'body' | 'analytics'
  const [notification, setNotification] = useState(null);
  const [focusedPart, setFocusedPart] = useState(null);

  useEffect(() => {
    seedSampleData();
    setEntries(StorageService.getAll());
  }, []);

  const showNotif = (msg) => {
    setNotification(msg);
    setTimeout(() => setNotification(null), 2500);
  };

  const handleSave = useCallback((entry) => {
    StorageService.addEntry(entry);
    setEntries(StorageService.getAll());
    showNotif('Entry saved successfully');
  }, []);

  const handleDelete = useCallback((id) => {
    StorageService.deleteEntry(id);
    setEntries(StorageService.getAll());
    showNotif('Entry deleted');
  }, []);

  return (
    <>
      <nav className="nav">
        <div className="nav-logo">SOMA<span> /tracker</span></div>
        <div className="nav-tabs">
          <button className={`nav-tab${view === 'body' ? ' active' : ''}`} onClick={() => setView('body')}>
            Body Map
          </button>
          <button className={`nav-tab${view === 'analytics' ? ' active' : ''}`} onClick={() => setView('analytics')}>
            Analytics
          </button>
        </div>
        <div className="nav-right">
          <div className="entry-count">{entries.length} entries</div>
        </div>
      </nav>

      <div className="app-body">
        {view === 'body' && (
          <div className="body-view">
            <BodyCanvas
              entries={entries}
              onPartHover={setFocusedPart}
            />
            <DataEntryForm
              entries={entries}
              onSave={handleSave}
              focusedPart={focusedPart}
            />
          </div>
        )}

        {view === 'analytics' && (
          <AnalyticsDashboard entries={entries} onDelete={handleDelete} />
        )}
      </div>

      {notification && (
        <div className="notification">{notification}</div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
